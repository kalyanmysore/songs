            .slider-section label {

            .slider-section input {

            }

        .iframe-section {
            flex: 1;
            padding: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .songs-section {
                padding: 10px;
            }

        const container = document.getElementById('songs-container');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');
        let currentRate = 1.0;

        // Update speed display
        speedSlider.addEventListener('input', function () {
            const percentage = this.value;
            speedValue.textContent = percentage + '%';
            currentRate = percentage / 100;
        });

        songsData.songs.forEach(song => {
            const songDiv = document.createElement('div');
            songDiv.className = 'song';
            const title = document.createElement('h2');
            title.textContent = song.title;
            songDiv.appendChild(title);
            const linesList = document.createElement('ul');
            linesList.className = 'lines';
            song.lines.forEach(line => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.textContent = line.label;
                a.onclick = () => {
                    let url = line.url;
                    // Append rate if not already present
                    if (url.includes('&rate=')) {
                        url = url.replace(/&rate=[^&]*/, '&rate=' + currentRate);
                    } else {
                        url += '&rate=' + currentRate;
                    }
                    document.querySelector('iframe[name="song"]').src = url;
                };
                li.appendChild(a);
                linesList.appendChild(li);
            });
            songDiv.appendChild(linesList);
            container.appendChild(songDiv);
        });</script>
