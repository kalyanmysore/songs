<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isha</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .songs-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            border-bottom: 1px solid #ccc;
        }

        .song {
            margin-bottom: 30px;
        }

            .song h2 {
                color: #333;
                font-weight: bold;
            }

        .lines {
            list-style-type: none;
            padding: 0;
        }

            .lines li {
                margin: 5px 0;
            }

            .lines a {
                text-decoration: none;
                color: #007bff;
                cursor: pointer;
            }

                .lines a:hover {
                    text-decoration: underline;
                }

        .slider-section {
            padding: 10px 20px;
            border-bottom: 1px solid #ccc;
            text-align: center;
        }

            .slider-section label {
                display: block;
                margin-bottom: 5px;
            }

            .slider-section input {
                width: 80%;
                max-width: 300px;
            }

        .iframe-section {
            flex: 1;
            padding: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .songs-section {
                padding: 10px;
            }

            .slider-section {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="songs-section">
        <h1>Songs</h1>
        <div id="songs-container"></div>
    </div>
    <hr style="margin: 0; border: 1px solid #ccc;">
    <div class="slider-section">
        <label for="speed-slider">Playback Speed: <span id="speed-value">100%</span></label>
        <input type="range" id="speed-slider" min="25" max="200" step="5" value="100">
    </div>
    <hr style="margin: 0; border: 1px solid #ccc;">
    <div class="iframe-section">
        <iframe name="song" title="Song Content" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture" allowfullscreen></iframe>
    </div>

    <script>

                        {

                        },
                        {

                        {

                            "url": "https://www.looptube.io/?videoId=vMj_asBAiKA&start=118.83100318882751&end=129.39990999046324"
                        },
                        {

                            "url": "https://www.looptube.io/?videoId=vMj_asBAiKA&start=129.39990999046324&end=140.30006491226197"
                        },
                        {
                            "label": "Tam Trotakam",
                            "url": "https://www.looptube.io/?videoId=vMj_asBAiKA&start=140.37386102479553&end=150.71356696185302"
                        },
                        {
                            "label": "Shruti Smruti",
                            "url": "https://www.looptube.io/?videoId=vMj_asBAiKA&start=150.71356696185302&end=165.63559906866456"
                        },
                        {
                            "label": "Shankaram",
                            "url": "https://www.looptube.io/?videoId=vMj_asBAiKA&start=165.8686917997284&end=181.00270790463256"
                        },
                        {
                            "label": "Yadwaarae",
                            "url": "https://www.looptube.io/?videoId=vMj_asBAiKA&start=181.00270790463256&end=197.77389491226197"
                        },
                        {
                            "label": "Lookaagnaana",
                            "url": "https://www.looptube.io/?videoId=vMj_asBAiKA&start=197.89190703242494&end=214.68048319073486"
                        },
                        {

                            "url": "https://www.looptube.io/?videoId=vMj_asBAiKA&start=215.2&end=336.46845301335145"

                        {

                        },
                        {
                            "label": "EEkam nityam",

                        },
                        {
                            "label": "Agnaana",
                            "url": "https://www.looptube.io/?videoId=vMj_asBAiKA&start=464.28234618310546&end=481.20647082452393"
                        },
                        {
                            "label": "Pushpaanjalim",
                            "url": "https://www.looptube.io/?videoId=vMj_asBAiKA&start=481.20647082452393&end=490.1011131449585"
                        }
                    ]
                }
            ]
        }

;

        const container = document.getElementById('songs-container');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');
        let currentRate = 1.0;

        // Update speed display
        speedSlider.addEventListener('input', function () {
            const percentage = this.value;
            speedValue.textContent = percentage + '%';
            currentRate = percentage / 100;
        });

        songsData.songs.forEach(song => {
            const songDiv = document.createElement('div');
            songDiv.className = 'song';
            const title = document.createElement('h2');
            title.textContent = song.title;
            songDiv.appendChild(title);
            const linesList = document.createElement('ul');
            linesList.className = 'lines';
            song.lines.forEach(line => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.textContent = line.label;
                a.onclick = () => {
                    let url = line.url;
                    // Append rate if not already present
                    if (url.includes('&rate=')) {
                        url = url.replace(/&rate=[^&]*/, '&rate=' + currentRate);
                    } else {
                        url += '&rate=' + currentRate;
                    }
                    document.querySelector('iframe[name="song"]').src = url;
                };
                li.appendChild(a);
                linesList.appendChild(li);
            });
            songDiv.appendChild(linesList);
            container.appendChild(songDiv);
        });</script>
</body>
</html>
